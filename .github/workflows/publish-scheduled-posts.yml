name: Publish Scheduled Posts

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

# Permisos mínimos necesarios:
#   - contents: write → commit+push a content/posts
# Todo lo demás (pull-requests, issues, packages, id-token…) queda en `none`
# por el default de GitHub cuando se declaran permisos explícitos.
permissions:
  contents: write

# Evita solapamientos si un run tarda > 1 hora: cancela el anterior.
concurrency:
  group: publish-scheduled-posts
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # Corta cualquier ejecución colgada. El script migra status y hace git push;
    # no debería pasar de 3-5 min en condiciones normales.
    timeout-minutes: 10
    steps:
      # Acciones pinned a SHA por seguridad (supply-chain): un tag como @v4 es
      # mutable y podría ser reapuntado. El comentario indica la versión legible.
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # fetch-depth: 1 es suficiente: solo necesitamos HEAD para commit+push.
          fetch-depth: 1
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: '22'

      - name: Sync scheduled/published statuses
        run: node scripts/migrate-posts-status.mjs
        working-directory: next_app

      - name: Commit and push changes
        run: |
          if [ -z "$(git status --porcelain -- next_app/content/posts)" ]; then
            echo "No status changes to commit"
            exit 0
          fi

          git add next_app/content/posts
          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' commit -m "chore(content): publish scheduled posts"
          git push
