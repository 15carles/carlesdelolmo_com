<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="Recorrido comercial desde un catálogo web industrial hasta una consulta B2B: búsqueda específica, página de producto o aplicación, documentación técnica, formulario contextual y conversación comercial">
  <defs>
    <style>
      .serif{font-family:Georgia,'Times New Roman',serif}
      .sans{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    </style>
    <marker id="fwd" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#145C35"/>
    </marker>
  </defs>

  <rect width="1200" height="520" fill="#FDFCFA"/>
  <circle cx="1130" cy="40" r="130" fill="#DBEEE0" opacity="0.5"/>

  <text x="80" y="66" class="sans" font-size="17" letter-spacing="3" font-weight="700" fill="#145C35">DEL CLIC A LA CONVERSACIÓN</text>
  <text x="80" y="114" class="serif" font-size="30" font-weight="700" fill="#1D1B16">Recorrido comercial de un catálogo web industrial</text>

  <!-- Card 1: búsqueda -->
  <rect x="44" y="180" width="200" height="200" rx="18" fill="#FFFFFF" stroke="#E6DFD0" stroke-width="2"/>
  <circle cx="66" cy="202" r="14" fill="#ECF6EF" stroke="#2FA866" stroke-width="1.5"/>
  <text x="66" y="207" class="sans" font-size="14" font-weight="700" fill="#145C35" text-anchor="middle">1</text>
  <circle cx="144" cy="250" r="26" fill="#ECF6EF"/>
  <circle cx="140" cy="246" r="11" fill="none" stroke="#145C35" stroke-width="2.6"/>
  <line x1="148" y1="254" x2="158" y2="264" stroke="#145C35" stroke-width="2.6" stroke-linecap="round"/>
  <text x="144" y="318" class="sans" font-size="18" font-weight="600" fill="#1D1B16" text-anchor="middle">Búsqueda</text>
  <text x="144" y="343" class="sans" font-size="18" font-weight="600" fill="#1D1B16" text-anchor="middle">específica</text>

  <line x1="250" y1="280" x2="266" y2="280" stroke="#145C35" stroke-width="2.5" marker-end="url(#fwd)"/>

  <!-- Card 2: página producto -->
  <rect x="272" y="180" width="200" height="200" rx="18" fill="#FFFFFF" stroke="#E6DFD0" stroke-width="2"/>
  <circle cx="294" cy="202" r="14" fill="#ECF6EF" stroke="#2FA866" stroke-width="1.5"/>
  <text x="294" y="207" class="sans" font-size="14" font-weight="700" fill="#145C35" text-anchor="middle">2</text>
  <circle cx="372" cy="250" r="26" fill="#ECF6EF"/>
  <rect x="356" y="236" width="32" height="28" rx="4" fill="none" stroke="#145C35" stroke-width="2.4"/>
  <line x1="356" y1="244" x2="388" y2="244" stroke="#145C35" stroke-width="2.4"/>
  <line x1="361" y1="252" x2="376" y2="252" stroke="#145C35" stroke-width="2"/>
  <line x1="361" y1="258" x2="383" y2="258" stroke="#145C35" stroke-width="2"/>
  <text x="372" y="318" class="sans" font-size="18" font-weight="600" fill="#1D1B16" text-anchor="middle">Página de producto</text>
  <text x="372" y="343" class="sans" font-size="18" font-weight="600" fill="#1D1B16" text-anchor="middle">o aplicación</text>

  <line x1="478" y1="280" x2="494" y2="280" stroke="#145C35" stroke-width="2.5" marker-end="url(#fwd)"/>

  <!-- Card 3: documentación -->
  <rect x="500" y="180" width="200" height="200" rx="18" fill="#FFFFFF" stroke="#E6DFD0" stroke-width="2"/>
  <circle cx="522" cy="202" r="14" fill="#ECF6EF" stroke="#2FA866" stroke-width="1.5"/>
  <text x="522" y="207" class="sans" font-size="14" font-weight="700" fill="#145C35" text-anchor="middle">3</text>
  <circle cx="600" cy="250" r="26" fill="#ECF6EF"/>
  <path d="M588 234 h16 l8 8 v24 h-24 z" fill="none" stroke="#145C35" stroke-width="2.4" stroke-linejoin="round"/>
  <path d="M600 244 v12 M595 252 l5 5 5 -5" fill="none" stroke="#145C35" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="600" y="318" class="sans" font-size="18" font-weight="600" fill="#1D1B16" text-anchor="middle">Documentación</text>
  <text x="600" y="343" class="sans" font-size="18" font-weight="600" fill="#1D1B16" text-anchor="middle">técnica</text>

  <line x1="706" y1="280" x2="722" y2="280" stroke="#145C35" stroke-width="2.5" marker-end="url(#fwd)"/>

  <!-- Card 4: formulario -->
  <rect x="728" y="180" width="200" height="200" rx="18" fill="#FFFFFF" stroke="#E6DFD0" stroke-width="2"/>
  <circle cx="750" cy="202" r="14" fill="#ECF6EF" stroke="#2FA866" stroke-width="1.5"/>
  <text x="750" y="207" class="sans" font-size="14" font-weight="700" fill="#145C35" text-anchor="middle">4</text>
  <circle cx="828" cy="250" r="26" fill="#ECF6EF"/>
  <rect x="813" y="234" width="30" height="32" rx="4" fill="none" stroke="#145C35" stroke-width="2.4"/>
  <line x1="819" y1="243" x2="837" y2="243" stroke="#145C35" stroke-width="2"/>
  <line x1="819" y1="251" x2="837" y2="251" stroke="#145C35" stroke-width="2"/>
  <path d="M819 259 l4 4 7 -8" fill="none" stroke="#145C35" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="828" y="318" class="sans" font-size="18" font-weight="600" fill="#1D1B16" text-anchor="middle">Formulario</text>
  <text x="828" y="343" class="sans" font-size="18" font-weight="600" fill="#1D1B16" text-anchor="middle">contextual</text>

  <line x1="934" y1="280" x2="950" y2="280" stroke="#145C35" stroke-width="2.5" marker-end="url(#fwd)"/>

  <!-- Card 5: conversación -->
  <rect x="956" y="180" width="200" height="200" rx="18" fill="#ECF6EF" stroke="#2FA866" stroke-width="2"/>
  <circle cx="978" cy="202" r="14" fill="#FFFFFF" stroke="#2FA866" stroke-width="1.5"/>
  <text x="978" y="207" class="sans" font-size="14" font-weight="700" fill="#145C35" text-anchor="middle">5</text>
  <circle cx="1056" cy="250" r="26" fill="#145C35"/>
  <path d="M1042 240 h20 a5 5 0 0 1 5 5 v10 a5 5 0 0 1 -5 5 h-12 l-8 7 v-7 a5 5 0 0 1 -5 -5 v-10 a5 5 0 0 1 5 -5 z" fill="#FDFCFA"/>
  <text x="1056" y="318" class="sans" font-size="18" font-weight="600" fill="#145C35" text-anchor="middle">Conversación</text>
  <text x="1056" y="343" class="sans" font-size="18" font-weight="600" fill="#145C35" text-anchor="middle">comercial</text>

  <text x="600" y="442" class="sans" font-size="19" font-style="italic" fill="#837D70" text-anchor="middle">Cada paso aporta contexto: la consulta llega al equipo comercial</text>
  <text x="600" y="470" class="sans" font-size="19" font-style="italic" fill="#837D70" text-anchor="middle">con producto, aplicación y necesidad ya identificados.</text>
</svg>
