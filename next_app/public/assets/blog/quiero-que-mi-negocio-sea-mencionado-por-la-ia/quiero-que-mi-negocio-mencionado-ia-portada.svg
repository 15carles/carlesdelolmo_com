<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="Una persona pregunta a una IA qué empresa le recomienda; entre varias empresas que compiten, la IA elige la más clara y fiable">
  <defs>
    <style>
      .serif{font-family:Georgia,'Times New Roman',serif}
      .sans{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    </style>
    <marker id="arrowG" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 z" fill="#145C35"/>
    </marker>
    <marker id="arrowM" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 z" fill="#B4AB98"/>
    </marker>
  </defs>

  <rect width="1280" height="760" fill="#FDFCFA"/>
  <circle cx="1180" cy="80" r="230" fill="#DBEEE0" opacity="0.55"/>
  <circle cx="70" cy="720" r="210" fill="#F7EEDD" opacity="0.6"/>

  <text x="80" y="88" class="sans" font-size="20" letter-spacing="3.5" font-weight="700" fill="#145C35">VISIBILIDAD EN IA</text>

  <!-- Prompt pill -->
  <rect x="80" y="150" width="600" height="96" rx="48" fill="#FFFFFF" stroke="#D5CCB8" stroke-width="2"/>
  <text x="118" y="207" class="serif" font-size="30" fill="#1D1B16">¿Qué empresa me recomiendas?</text>
  <circle cx="628" cy="198" r="30" fill="#145C35"/>
  <path d="M615 198 h22 M629 190 l9 8 -9 8" fill="none" stroke="#FDFCFA" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- AI response card -->
  <rect x="80" y="316" width="600" height="380" rx="24" fill="#FFFFFF" stroke="#E6DFD0" stroke-width="2"/>
  <circle cx="122" cy="368" r="22" fill="#145C35"/>
  <path d="M122 356 v24 M110 368 h24 M114 360 l16 16 M130 360 l-16 16" stroke="#FDFCFA" stroke-width="2.5" stroke-linecap="round"/>
  <text x="160" y="377" class="serif" font-size="26" fill="#1D1B16">Respuesta de la IA</text>
  <line x1="112" y1="404" x2="648" y2="404" stroke="#E6DFD0" stroke-width="2"/>

  <!-- Recommended row -->
  <rect x="112" y="430" width="536" height="104" rx="16" fill="#ECF6EF" stroke="#2FA866" stroke-width="2"/>
  <rect x="134" y="452" width="60" height="60" rx="14" fill="#145C35"/>
  <text x="164" y="491" class="serif" font-size="26" font-weight="700" fill="#FDFCFA" text-anchor="middle">TE</text>
  <text x="214" y="476" class="serif" font-size="26" fill="#1D1B16">Tu empresa</text>
  <text x="214" y="506" class="sans" font-size="17" fill="#57534A">clara · especializada · fiable</text>
  <circle cx="606" cy="482" r="20" fill="#145C35"/>
  <path d="M596 482 l7 8 13 -15" fill="none" stroke="#FDFCFA" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="112" y="588" class="sans" font-size="19" font-style="italic" fill="#837D70">La IA elige la fuente más clara, especializada</text>
  <text x="112" y="616" class="sans" font-size="19" font-style="italic" fill="#837D70">y fiable, no la que más grita.</text>

  <!-- Right column: competing companies -->
  <text x="760" y="176" class="sans" font-size="19" letter-spacing="1.5" font-weight="700" fill="#57534A">EMPRESAS QUE COMPITEN</text>

  <!-- chosen -->
  <rect x="760" y="206" width="440" height="104" rx="16" fill="#FFFFFF" stroke="#2FA866" stroke-width="2.5"/>
  <rect x="782" y="228" width="60" height="60" rx="14" fill="#145C35"/>
  <text x="812" y="267" class="serif" font-size="26" font-weight="700" fill="#FDFCFA" text-anchor="middle">TE</text>
  <text x="862" y="252" class="serif" font-size="25" fill="#1D1B16">Tu empresa</text>
  <text x="862" y="282" class="sans" font-size="16" fill="#145C35">Web clara y bien estructurada</text>
  <path d="M760 258 L688 482" fill="none" stroke="#145C35" stroke-width="2.5" marker-end="url(#arrowG)"/>

  <!-- competitor 1 -->
  <rect x="760" y="330" width="440" height="96" rx="16" fill="#F4F0E7" stroke="#E6DFD0" stroke-width="2"/>
  <rect x="782" y="350" width="56" height="56" rx="13" fill="#D5CCB8"/>
  <text x="858" y="374" class="serif" font-size="24" fill="#837D70">Empresa genérica</text>
  <text x="858" y="402" class="sans" font-size="16" fill="#A79E8B">Mensaje que no dice nada concreto</text>

  <!-- competitor 2 -->
  <rect x="760" y="446" width="440" height="96" rx="16" fill="#F4F0E7" stroke="#E6DFD0" stroke-width="2"/>
  <rect x="782" y="466" width="56" height="56" rx="13" fill="#D5CCB8"/>
  <text x="858" y="490" class="serif" font-size="24" fill="#837D70">Empresa sin estructura</text>
  <text x="858" y="518" class="sans" font-size="16" fill="#A79E8B">Contenido disperso y difícil de leer</text>

  <!-- competitor 3 -->
  <rect x="760" y="562" width="440" height="96" rx="16" fill="#F4F0E7" stroke="#E6DFD0" stroke-width="2"/>
  <rect x="782" y="582" width="56" height="56" rx="13" fill="#D5CCB8"/>
  <text x="858" y="606" class="serif" font-size="24" fill="#837D70">Empresa sin autoridad</text>
  <text x="858" y="634" class="sans" font-size="16" fill="#A79E8B">No demuestra criterio en su tema</text>

  <path d="M760 378 L692 470" fill="none" stroke="#B4AB98" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowM)"/>
  <path d="M760 494 L692 500" fill="none" stroke="#B4AB98" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowM)"/>
  <path d="M760 610 L692 528" fill="none" stroke="#B4AB98" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowM)"/>
</svg>
