<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Comparativa entre catálogo PDF y catálogo web para una empresa industrial: a la izquierda, un documento único y cerrado; a la derecha, una estructura de páginas conectadas con familias, aplicaciones, sectores, fichas y contacto">
  <defs>
    <style>
      .serif{font-family:Georgia,'Times New Roman',serif}
      .sans{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    </style>
  </defs>

  <rect width="1200" height="900" fill="#FDFCFA"/>
  <circle cx="1120" cy="60" r="170" fill="#DBEEE0" opacity="0.5"/>
  <circle cx="60" cy="850" r="150" fill="#F7EEDD" opacity="0.55"/>

  <text x="80" y="82" class="sans" font-size="19" letter-spacing="3" font-weight="700" fill="#145C35">CATÁLOGO INDUSTRIAL</text>
  <text x="80" y="134" class="serif" font-size="34" font-weight="700" fill="#1D1B16">Dos formatos, dos funciones distintas</text>

  <!-- ===== Left panel: PDF ===== -->
  <rect x="80" y="180" width="490" height="620" rx="22" fill="#FFFFFF" stroke="#E6DFD0" stroke-width="2"/>
  <rect x="240" y="212" width="170" height="42" rx="21" fill="#F7EEDD" stroke="#9A5B1E" stroke-width="1.5"/>
  <text x="325" y="240" class="serif" font-size="22" font-weight="700" fill="#9A5B1E" text-anchor="middle">Catálogo PDF</text>

  <!-- stacked pages behind -->
  <rect x="196" y="306" width="290" height="360" rx="8" fill="#F4F0E7" stroke="#D5CCB8" stroke-width="1.5"/>
  <rect x="188" y="298" width="290" height="360" rx="8" fill="#F1EBDF" stroke="#D5CCB8" stroke-width="1.5"/>
  <!-- front page with folded corner -->
  <path d="M180 298 h252 l38 38 v314 a8 8 0 0 1 -8 8 h-282 a8 8 0 0 1 -8 -8 v-344 a8 8 0 0 1 8 -8 z" fill="#FFFFFF" stroke="#D5CCB8" stroke-width="2"/>
  <path d="M432 298 v30 a8 8 0 0 0 8 8 h30 z" fill="#F1EBDF" stroke="#D5CCB8" stroke-width="2"/>
  <!-- PDF badge -->
  <rect x="200" y="320" width="64" height="30" rx="8" fill="#9A5B1E"/>
  <text x="232" y="341" class="sans" font-size="16" font-weight="700" fill="#FDFCFA" text-anchor="middle">PDF</text>
  <!-- content bars -->
  <rect x="200" y="374" width="230" height="16" rx="8" fill="#E6DFD0"/>
  <rect x="200" y="402" width="180" height="12" rx="6" fill="#F1EBDF"/>
  <rect x="200" y="424" width="210" height="12" rx="6" fill="#F1EBDF"/>
  <!-- mini product grid -->
  <rect x="200" y="456" width="120" height="80" rx="8" fill="#F4F0E7" stroke="#E6DFD0" stroke-width="1.5"/>
  <rect x="332" y="456" width="120" height="80" rx="8" fill="#F4F0E7" stroke="#E6DFD0" stroke-width="1.5"/>
  <rect x="200" y="548" width="120" height="80" rx="8" fill="#F4F0E7" stroke="#E6DFD0" stroke-width="1.5"/>
  <rect x="332" y="548" width="120" height="80" rx="8" fill="#F4F0E7" stroke="#E6DFD0" stroke-width="1.5"/>
  <text x="326" y="652" class="sans" font-size="14" fill="#837D70" text-anchor="middle">pág. 1 / 200</text>

  <!-- download pill -->
  <rect x="187" y="688" width="276" height="48" rx="24" fill="#F7EEDD" stroke="#9A5B1E" stroke-width="1.5"/>
  <path d="M215 700 v16 M208 710 l7 7 7 -7 M206 722 h18" stroke="#9A5B1E" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="240" y="719" class="sans" font-size="17" font-weight="600" fill="#9A5B1E">Descargar catálogo</text>

  <text x="325" y="770" class="sans" font-size="17" fill="#57534A" text-anchor="middle">Documento único y cerrado:</text>
  <text x="325" y="794" class="sans" font-size="17" fill="#57534A" text-anchor="middle">todos los visitantes siguen el mismo recorrido</text>

  <!-- ===== Right panel: Web ===== -->
  <rect x="630" y="180" width="490" height="620" rx="22" fill="#FFFFFF" stroke="#E6DFD0" stroke-width="2"/>
  <rect x="790" y="212" width="170" height="42" rx="21" fill="#ECF6EF" stroke="#145C35" stroke-width="1.5"/>
  <text x="875" y="240" class="serif" font-size="22" font-weight="700" fill="#145C35" text-anchor="middle">Catálogo web</text>

  <!-- sitemap: root -->
  <rect x="787" y="300" width="176" height="48" rx="12" fill="#145C35"/>
  <text x="875" y="331" class="serif" font-size="20" font-weight="700" fill="#FDFCFA" text-anchor="middle">Catálogo</text>
  <!-- connectors root -> level 2 -->
  <path d="M875 348 v22 M720 370 h310 M720 370 v26 M875 370 v26 M1030 370 v26" stroke="#D5CCB8" stroke-width="2" fill="none"/>
  <!-- level 2 -->
  <rect x="650" y="396" width="140" height="48" rx="12" fill="#ECF6EF" stroke="#2FA866" stroke-width="1.5"/>
  <text x="720" y="426" class="sans" font-size="17" font-weight="600" fill="#145C35" text-anchor="middle">Familias</text>
  <rect x="805" y="396" width="140" height="48" rx="12" fill="#ECF6EF" stroke="#2FA866" stroke-width="1.5"/>
  <text x="875" y="426" class="sans" font-size="17" font-weight="600" fill="#145C35" text-anchor="middle">Aplicaciones</text>
  <rect x="960" y="396" width="140" height="48" rx="12" fill="#ECF6EF" stroke="#2FA866" stroke-width="1.5"/>
  <text x="1030" y="426" class="sans" font-size="17" font-weight="600" fill="#145C35" text-anchor="middle">Sectores</text>
  <!-- connectors level 2 -> level 3 -->
  <path d="M720 444 v24 M875 444 v24 M1030 444 v24 M720 468 h310 M875 468 v26" stroke="#D5CCB8" stroke-width="2" fill="none"/>
  <!-- level 3 -->
  <rect x="710" y="494" width="330" height="52" rx="12" fill="#FFFFFF" stroke="#145C35" stroke-width="2"/>
  <text x="875" y="527" class="sans" font-size="17" font-weight="600" fill="#1D1B16" text-anchor="middle">Fichas con URL propia</text>
  <!-- annotation: searches and AI reach these pages -->
  <text x="674" y="507" class="sans" font-size="14" font-style="italic" fill="#837D70" text-anchor="middle">búsquedas</text>
  <text x="674" y="525" class="sans" font-size="14" font-style="italic" fill="#837D70" text-anchor="middle">e IA</text>
  <path d="M674 534 q0 14 24 14" stroke="#837D70" stroke-width="1.5" stroke-dasharray="3 4" fill="none"/>
  <path d="M698 544 l8 4 -8 4" stroke="#837D70" stroke-width="1.5" fill="none" transform="translate(0,-4)"/>
  <!-- connectors level 3 -> contact -->
  <path d="M875 546 v26" stroke="#D5CCB8" stroke-width="2" fill="none"/>
  <!-- contact -->
  <rect x="755" y="572" width="240" height="52" rx="26" fill="#145C35"/>
  <text x="875" y="605" class="sans" font-size="17" font-weight="600" fill="#FDFCFA" text-anchor="middle">Contacto contextual</text>

  <!-- doc download as support -->
  <path d="M875 624 v22" stroke="#D5CCB8" stroke-width="2" stroke-dasharray="4 5" fill="none"/>
  <text x="875" y="672" class="sans" font-size="15" font-style="italic" fill="#837D70" text-anchor="middle">+ documentación descargable como apoyo</text>

  <text x="875" y="770" class="sans" font-size="17" fill="#57534A" text-anchor="middle">Páginas conectadas entre sí:</text>
  <text x="875" y="794" class="sans" font-size="17" fill="#57534A" text-anchor="middle">cada solución puede encontrarse y compartirse</text>

  <text x="600" y="862" class="sans" font-size="19" font-style="italic" fill="#837D70" text-anchor="middle">El PDF resume y acompaña. La web descubre, explica y guía.</text>
</svg>
