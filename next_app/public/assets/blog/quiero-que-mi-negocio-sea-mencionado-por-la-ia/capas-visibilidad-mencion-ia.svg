<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Pirámide de capas que aumentan la probabilidad de ser mencionado por una IA: de base a cima, web clara y rápida, SEO técnico, arquitectura semántica, contenido útil y citable, autoridad temática y mención por IA">
  <defs>
    <style>
      .serif{font-family:Georgia,'Times New Roman',serif}
      .sans{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    </style>
    <marker id="up" markerWidth="12" markerHeight="12" refX="4" refY="9" orient="auto">
      <path d="M4 0 L8 8 L0 8 z" fill="#145C35"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="#FDFCFA"/>
  <circle cx="1120" cy="70" r="180" fill="#DBEEE0" opacity="0.5"/>

  <text x="80" y="86" class="sans" font-size="19" letter-spacing="3" font-weight="700" fill="#145C35">GEO · VISIBILIDAD EN IA</text>
  <text x="80" y="140" class="serif" font-size="34" font-weight="700" fill="#1D1B16">Capas que aumentan la probabilidad</text>
  <text x="80" y="182" class="serif" font-size="34" font-weight="700" fill="#1D1B16">de ser mencionado por una IA</text>

  <!-- Pyramid -->
  <polygon points="530,250 670,250 726.7,345 473.3,345" fill="#145C35" stroke="#FDFCFA" stroke-width="3"/>
  <polygon points="473.3,345 726.7,345 783.3,440 416.7,440" fill="#1F7A45" stroke="#FDFCFA" stroke-width="3"/>
  <polygon points="416.7,440 783.3,440 840,535 360,535" fill="#2FA866" stroke="#FDFCFA" stroke-width="3"/>
  <polygon points="360,535 840,535 896.7,630 303.3,630" fill="#79C39B" stroke="#FDFCFA" stroke-width="3"/>
  <polygon points="303.3,630 896.7,630 953.3,725 246.7,725" fill="#BFE3CE" stroke="#FDFCFA" stroke-width="3"/>
  <polygon points="246.7,725 953.3,725 1010,820 190,820" fill="#ECF6EF" stroke="#DBEEE0" stroke-width="3"/>

  <text x="600" y="306" class="serif" font-size="25" font-weight="700" fill="#FDFCFA" text-anchor="middle">Mención por IA</text>
  <text x="600" y="401" class="serif" font-size="25" fill="#FDFCFA" text-anchor="middle">Autoridad temática</text>
  <text x="600" y="496" class="serif" font-size="25" fill="#FDFCFA" text-anchor="middle">Contenido útil y citable</text>
  <text x="600" y="591" class="serif" font-size="25" fill="#0E4A2A" text-anchor="middle">Arquitectura semántica</text>
  <text x="600" y="686" class="serif" font-size="25" fill="#14532B" text-anchor="middle">SEO técnico</text>
  <text x="600" y="781" class="serif" font-size="25" fill="#145C35" text-anchor="middle">Web clara y rápida</text>

  <!-- Ascending guide -->
  <line x1="130" y1="815" x2="130" y2="270" stroke="#145C35" stroke-width="2.5" marker-end="url(#up)"/>
  <text transform="translate(112,545) rotate(-90)" class="sans" font-size="17" font-weight="600" fill="#57534A" text-anchor="middle">más difícil · más valioso</text>

  <text x="600" y="866" class="sans" font-size="19" font-style="italic" fill="#837D70" text-anchor="middle">Se lee de abajo arriba: cada capa hace posible la siguiente.</text>
</svg>
