<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="Flujo de corrección de la identidad digital en cinco pasos: documentar el error, revisar las fuentes citadas, convertir la web en referencia, alinear los perfiles externos y desambiguar la entidad">
  <defs>
    <style>
      .serif{font-family:Georgia,'Times New Roman',serif}
      .sans{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    </style>
    <marker id="fwd2" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#145C35"/>
    </marker>
  </defs>

  <rect width="1200" height="520" fill="#FDFCFA"/>
  <circle cx="1130" cy="40" r="130" fill="#DBEEE0" opacity="0.5"/>

  <text x="80" y="66" class="sans" font-size="17" letter-spacing="3" font-weight="700" fill="#145C35">CORREGIR LO QUE SÍ CONTROLAS</text>
  <text x="80" y="114" class="serif" font-size="30" font-weight="700" fill="#1D1B16">De la respuesta errónea a una identidad más clara</text>

  <!-- Card 1: documentar -->
  <rect x="44" y="180" width="200" height="200" rx="18" fill="#FFFFFF" stroke="#E6DFD0" stroke-width="2"/>
  <circle cx="66" cy="202" r="14" fill="#ECF6EF" stroke="#2FA866" stroke-width="1.5"/>
  <text x="66" y="207" class="sans" font-size="14" font-weight="700" fill="#145C35" text-anchor="middle">1</text>
  <circle cx="144" cy="250" r="26" fill="#ECF6EF"/>
  <rect x="131" y="234" width="26" height="32" rx="4" fill="none" stroke="#145C35" stroke-width="2.4"/>
  <line x1="137" y1="243" x2="151" y2="243" stroke="#145C35" stroke-width="2"/>
  <line x1="137" y1="251" x2="151" y2="251" stroke="#145C35" stroke-width="2"/>
  <line x1="137" y1="259" x2="147" y2="259" stroke="#145C35" stroke-width="2"/>
  <text x="144" y="318" class="sans" font-size="18" font-weight="600" fill="#1D1B16" text-anchor="middle">Documentar</text>
  <text x="144" y="343" class="sans" font-size="18" font-weight="600" fill="#1D1B16" text-anchor="middle">el error</text>

  <line x1="250" y1="280" x2="266" y2="280" stroke="#145C35" stroke-width="2.5" marker-end="url(#fwd2)"/>

  <!-- Card 2: revisar fuentes -->
  <rect x="272" y="180" width="200" height="200" rx="18" fill="#FFFFFF" stroke="#E6DFD0" stroke-width="2"/>
  <circle cx="294" cy="202" r="14" fill="#ECF6EF" stroke="#2FA866" stroke-width="1.5"/>
  <text x="294" y="207" class="sans" font-size="14" font-weight="700" fill="#145C35" text-anchor="middle">2</text>
  <circle cx="372" cy="250" r="26" fill="#ECF6EF"/>
  <circle cx="368" cy="246" r="11" fill="none" stroke="#145C35" stroke-width="2.6"/>
  <line x1="376" y1="254" x2="386" y2="264" stroke="#145C35" stroke-width="2.6" stroke-linecap="round"/>
  <text x="372" y="318" class="sans" font-size="18" font-weight="600" fill="#1D1B16" text-anchor="middle">Revisar las</text>
  <text x="372" y="343" class="sans" font-size="18" font-weight="600" fill="#1D1B16" text-anchor="middle">fuentes citadas</text>

  <line x1="478" y1="280" x2="494" y2="280" stroke="#145C35" stroke-width="2.5" marker-end="url(#fwd2)"/>

  <!-- Card 3: web referencia -->
  <rect x="500" y="180" width="200" height="200" rx="18" fill="#FFFFFF" stroke="#E6DFD0" stroke-width="2"/>
  <circle cx="522" cy="202" r="14" fill="#ECF6EF" stroke="#2FA866" stroke-width="1.5"/>
  <text x="522" y="207" class="sans" font-size="14" font-weight="700" fill="#145C35" text-anchor="middle">3</text>
  <circle cx="600" cy="250" r="26" fill="#ECF6EF"/>
  <circle cx="600" cy="250" r="14" fill="none" stroke="#145C35" stroke-width="2.4"/>
  <line x1="586" y1="250" x2="614" y2="250" stroke="#145C35" stroke-width="2"/>
  <path d="M600 236 q7 14 0 28 q-7 -14 0 -28" fill="none" stroke="#145C35" stroke-width="2"/>
  <text x="600" y="318" class="sans" font-size="18" font-weight="600" fill="#1D1B16" text-anchor="middle">Web como</text>
  <text x="600" y="343" class="sans" font-size="18" font-weight="600" fill="#1D1B16" text-anchor="middle">referencia</text>

  <line x1="706" y1="280" x2="722" y2="280" stroke="#145C35" stroke-width="2.5" marker-end="url(#fwd2)"/>

  <!-- Card 4: alinear perfiles -->
  <rect x="728" y="180" width="200" height="200" rx="18" fill="#FFFFFF" stroke="#E6DFD0" stroke-width="2"/>
  <circle cx="750" cy="202" r="14" fill="#ECF6EF" stroke="#2FA866" stroke-width="1.5"/>
  <text x="750" y="207" class="sans" font-size="14" font-weight="700" fill="#145C35" text-anchor="middle">4</text>
  <circle cx="828" cy="250" r="26" fill="#ECF6EF"/>
  <rect x="814" y="236" width="12" height="12" rx="2.5" fill="none" stroke="#145C35" stroke-width="2.2"/>
  <rect x="830" y="236" width="12" height="12" rx="2.5" fill="none" stroke="#145C35" stroke-width="2.2"/>
  <rect x="814" y="252" width="12" height="12" rx="2.5" fill="none" stroke="#145C35" stroke-width="2.2"/>
  <rect x="830" y="252" width="12" height="12" rx="2.5" fill="#145C35"/>
  <text x="828" y="318" class="sans" font-size="18" font-weight="600" fill="#1D1B16" text-anchor="middle">Alinear los</text>
  <text x="828" y="343" class="sans" font-size="18" font-weight="600" fill="#1D1B16" text-anchor="middle">perfiles</text>

  <line x1="934" y1="280" x2="950" y2="280" stroke="#145C35" stroke-width="2.5" marker-end="url(#fwd2)"/>

  <!-- Card 5: desambiguar entidad -->
  <rect x="956" y="180" width="200" height="200" rx="18" fill="#ECF6EF" stroke="#2FA866" stroke-width="2"/>
  <circle cx="978" cy="202" r="14" fill="#FFFFFF" stroke="#2FA866" stroke-width="1.5"/>
  <text x="978" y="207" class="sans" font-size="14" font-weight="700" fill="#145C35" text-anchor="middle">5</text>
  <circle cx="1056" cy="250" r="26" fill="#145C35"/>
  <circle cx="1056" cy="250" r="6" fill="#FDFCFA"/>
  <circle cx="1038" cy="238" r="4" fill="#FDFCFA"/>
  <circle cx="1074" cy="238" r="4" fill="#FDFCFA"/>
  <circle cx="1056" cy="270" r="4" fill="#FDFCFA"/>
  <line x1="1053" y1="247" x2="1041" y2="240" stroke="#FDFCFA" stroke-width="1.8"/>
  <line x1="1059" y1="247" x2="1071" y2="240" stroke="#FDFCFA" stroke-width="1.8"/>
  <line x1="1056" y1="256" x2="1056" y2="266" stroke="#FDFCFA" stroke-width="1.8"/>
  <text x="1056" y="318" class="sans" font-size="18" font-weight="600" fill="#145C35" text-anchor="middle">Desambiguar</text>
  <text x="1056" y="343" class="sans" font-size="18" font-weight="600" fill="#145C35" text-anchor="middle">la entidad</text>

  <text x="600" y="442" class="sans" font-size="19" font-style="italic" fill="#837D70" text-anchor="middle">La corrección no es inmediata ni está garantizada: mejora las fuentes</text>
  <text x="600" y="470" class="sans" font-size="19" font-style="italic" fill="#837D70" text-anchor="middle">y vuelve a comprobar la respuesta pasado un tiempo.</text>
</svg>
