name: Merge interlink catálogo PDF vs web (one-shot 2026-07-23)

# Rutina de un solo uso. El 23 de julio de 2026 se publica el post
# "Catálogo PDF o catálogo web: qué conviene a una empresa industrial".
# Ese día, este workflow fusiona a main la rama
# `claude/interlink-catalogo-pdf-web-industrial`, que añade el enlace interno
# desde el post industrial de Alicante hacia el nuevo. No se fusionó antes
# para no dejar el enlace apuntando a una URL que aún devolvía 404.
#
# Tras completarse, el propio workflow se elimina para no volver a ejecutarse.

on:
  schedule:
    # 09:00 UTC del 23 de julio. Para entonces el workflow horario
    # `publish-scheduled-posts` (min :15) ya ha publicado el post nuevo.
    - cron: '0 9 23 7 *'
  workflow_dispatch:

# Permiso mínimo: contents:write para poder hacer merge + push a main.
permissions:
  contents: write

concurrency:
  group: merge-catalogo-interlink
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          # Historia completa: necesaria para un merge --no-ff real.
          fetch-depth: 0
          persist-credentials: true

      - name: Guard — solo el 23 jul 2026 o después
        id: guard
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          if [[ "$TODAY" < "2026-07-23" ]]; then
            echo "Todavía es pronto ($TODAY); no se hace nada."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fusionar la rama del interlink y retirar este workflow
        if: steps.guard.outputs.proceed == 'true'
        env:
          BRANCH: claude/interlink-catalogo-pdf-web-industrial
          POST: next_app/content/posts/web-empresas-industriales-alicante-catalogo-digital.mdoc
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git fetch origin "$BRANCH"

          # Idempotencia: si el enlace ya está en main, no fusionamos nada.
          if grep -q 'catalogo-pdf-o-catalogo-web-empresa-industrial' "$POST"; then
            echo "El enlace interno ya está en main; se omite el merge."
          else
            git merge --no-ff FETCH_HEAD \
              -m "Merge branch 'claude/interlink-catalogo-pdf-web-industrial': enlazar post industrial de Alicante con el post de catálogo PDF vs web"
          fi

          # One-shot: se elimina el propio workflow para no repetir la ejecución.
          git rm -f .github/workflows/merge-catalogo-interlink.yml
          git commit -m "chore(ci): retirar workflow one-shot tras fusionar el interlink de catálogo"

          git push origin HEAD:main
