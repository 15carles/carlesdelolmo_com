<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sin conexion | Carles del Olmo</title>
    <meta name="theme-color" content="#000000" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --panel: #101010;
        --text: #f5f5f5;
        --muted: #b8b8b8;
        --accent: #f3c86b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: radial-gradient(circle at top, #1a1a1a 0%, var(--bg) 60%);
        color: var(--text);
        font-family: Inter, Arial, sans-serif;
      }

      main {
        width: min(100%, 640px);
        padding: 32px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        background: rgba(16, 16, 16, 0.94);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 1.05;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      a,
      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 14px 18px;
        font: inherit;
        text-decoration: none;
        cursor: pointer;
      }

      .primary {
        background: var(--accent);
        color: #111;
        font-weight: 700;
      }

      .secondary {
        background: transparent;
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.15);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ahora mismo no hay conexion.</h1>
      <p>
        La web intentara cargarse de nuevo cuando recuperes internet. Mientras tanto,
        puedes volver a intentarlo o escribirme directamente.
      </p>
      <div class="actions">
        <button class="primary" type="button" onclick="window.location.reload()">Reintentar</button>
        <a class="secondary" href="https://wa.me/34668676302">Escribir por WhatsApp</a>
        <a class="secondary" href="/contacto">Ir a contacto</a>
      </div>
    </main>
  </body>
</html>
