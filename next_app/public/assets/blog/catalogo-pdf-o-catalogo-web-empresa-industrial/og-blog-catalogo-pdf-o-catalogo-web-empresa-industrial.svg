<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Catálogo PDF o catálogo web: qué conviene a una empresa industrial. Guía de diseño web B2B por Carles del Olmo">
  <defs>
    <style>
      .serif{font-family:Georgia,'Times New Roman',serif}
      .sans{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    </style>
  </defs>

  <rect width="1200" height="630" fill="#FDFCFA"/>
  <circle cx="1140" cy="70" r="230" fill="#DBEEE0" opacity="0.55"/>
  <circle cx="70" cy="600" r="200" fill="#F7EEDD" opacity="0.6"/>

  <text x="80" y="118" class="sans" font-size="22" letter-spacing="3.5" font-weight="700" fill="#145C35">DISEÑO WEB · INDUSTRIA B2B</text>

  <text x="80" y="220" class="serif" font-size="56" font-weight="700" fill="#1D1B16">¿Catálogo PDF</text>
  <text x="80" y="288" class="serif" font-size="56" font-weight="700" fill="#1D1B16">o catálogo web?</text>
  <text x="80" y="360" class="serif" font-size="30" fill="#57534A">Qué conviene a una empresa industrial</text>

  <!-- author chip -->
  <circle cx="104" cy="536" r="26" fill="#145C35"/>
  <text x="104" y="545" class="serif" font-size="24" font-weight="700" fill="#FDFCFA" text-anchor="middle">C</text>
  <text x="144" y="528" class="sans" font-size="24" font-weight="700" fill="#1D1B16">Carles del Olmo</text>
  <text x="144" y="558" class="sans" font-size="19" fill="#837D70">Diseño web · SEO · GEO</text>

  <!-- right motif: PDF + web card -->
  <rect x="792" y="150" width="330" height="300" rx="22" fill="#FFFFFF" stroke="#E6DFD0" stroke-width="2"/>
  <text x="957" y="196" class="serif" font-size="21" fill="#1D1B16" text-anchor="middle">Dos formatos, un sistema</text>
  <line x1="820" y1="216" x2="1094" y2="216" stroke="#E6DFD0" stroke-width="2"/>

  <!-- mini PDF doc -->
  <path d="M828 248 h74 l18 18 v98 a6 6 0 0 1 -6 6 h-86 a6 6 0 0 1 -6 -6 v-110 a6 6 0 0 1 6 -6 z" fill="#FFFFFF" stroke="#D5CCB8" stroke-width="2"/>
  <path d="M902 248 v14 a4 4 0 0 0 4 4 h14 z" fill="#F1EBDF" stroke="#D5CCB8" stroke-width="2"/>
  <rect x="834" y="262" width="42" height="22" rx="6" fill="#9A5B1E"/>
  <text x="855" y="278" class="sans" font-size="13" font-weight="700" fill="#FDFCFA" text-anchor="middle">PDF</text>
  <rect x="834" y="296" width="66" height="10" rx="5" fill="#F1EBDF"/>
  <rect x="834" y="314" width="76" height="10" rx="5" fill="#F1EBDF"/>
  <rect x="834" y="332" width="56" height="10" rx="5" fill="#F1EBDF"/>
  <text x="866" y="404" class="sans" font-size="15" fill="#837D70" text-anchor="middle">acompaña</text>

  <!-- plus sign -->
  <path d="M957 300 v24 M945 312 h24" stroke="#145C35" stroke-width="3" stroke-linecap="round"/>

  <!-- mini web tree -->
  <rect x="1006" y="242" width="84" height="28" rx="8" fill="#145C35"/>
  <text x="1048" y="261" class="sans" font-size="14" font-weight="600" fill="#FDFCFA" text-anchor="middle">Catálogo</text>
  <path d="M1048 270 v12 M1022 282 h52 M1022 282 v10 M1074 282 v10" stroke="#D5CCB8" stroke-width="2" fill="none"/>
  <rect x="996" y="292" width="52" height="24" rx="7" fill="#ECF6EF" stroke="#2FA866" stroke-width="1.5"/>
  <rect x="1058" y="292" width="52" height="24" rx="7" fill="#ECF6EF" stroke="#2FA866" stroke-width="1.5"/>
  <path d="M1022 316 v10 M1074 316 v10 M1022 326 h52 M1048 326 v10" stroke="#D5CCB8" stroke-width="2" fill="none"/>
  <rect x="1010" y="336" width="76" height="26" rx="13" fill="#145C35"/>
  <text x="1048" y="354" class="sans" font-size="13" font-weight="600" fill="#FDFCFA" text-anchor="middle">Contacto</text>
  <text x="1048" y="404" class="sans" font-size="15" fill="#837D70" text-anchor="middle">descubre y guía</text>
</svg>
