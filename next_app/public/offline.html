<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sin conexion | Carles del Olmo</title>
    <meta name="theme-color" content="#FAF7F1" />
    <style>
      :root {
        color-scheme: light;
        --bg: #FAF7F1;
        --panel: #FFFFFF;
        --text: #1D1B16;
        --muted: #57534A;
        --border: #E6DFD0;
        --accent: #145C35;
        --accent-hover: #1F7A45;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--text);
        font-family: Georgia, 'Times New Roman', serif;
      }

      main {
        width: min(100%, 640px);
        padding: 32px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--panel);
        box-shadow: 0 16px 40px -12px rgba(58, 50, 33, 0.16);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 1.1;
        letter-spacing: -0.015em;
        font-weight: 600;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
        line-height: 1.6;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      a,
      button {
        appearance: none;
        border: 0;
        border-radius: 10px;
        padding: 14px 18px;
        font: inherit;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
      }

      .primary {
        background: var(--accent);
        color: #FAF7F1;
      }

      .primary:hover {
        background: var(--accent-hover);
      }

      .secondary {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--text);
      }

      .secondary:hover {
        background: var(--text);
        color: var(--bg);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ahora mismo no hay conexion.</h1>
      <p>
        La web intentara cargarse de nuevo cuando recuperes internet. Mientras tanto,
        puedes volver a intentarlo o escribirme directamente.
      </p>
      <div class="actions">
        <button class="primary" type="button" onclick="window.location.reload()">Reintentar</button>
        <a class="secondary" href="https://wa.me/34668676302">Escribir por WhatsApp</a>
        <a class="secondary" href="/contacto">Ir a contacto</a>
      </div>
    </main>
  </body>
</html>
